<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://firebaseinstallations.googleapis.com" />
    <link rel="dns-prefetch" href="https://signic.email" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary Meta Tags -->
    <title>{{VITE_APP_NAME}} - Web3 Digital Identity Platform</title>
    <meta name="title" content="{{VITE_APP_NAME}} - Web3 Digital Identity Platform" />
    <meta
      name="description"
      content="{{VITE_APP_NAME}} builds decentralized identity and blockchain solutions for the modern web. Explore our Web3 products including wallet authentication, ENS/SNS support, and multi-chain compatibility."
    />
    <meta
      name="keywords"
      content="web3, decentralized identity, blockchain, crypto wallet, digital identity, Sudobility, signic.email, ENS, SNS, Ethereum, Solana"
    />
    <meta name="author" content="{{VITE_APP_NAME}}" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="application-name" content="{{VITE_APP_NAME}}" />
    <meta name="copyright" content="{{VITE_APP_NAME}}. All rights reserved." />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://{{VITE_APP_DOMAIN}}/" />
    <meta property="og:title" content="{{VITE_APP_NAME}} - Web3 Digital Identity Platform" />
    <meta
      property="og:description"
      content="{{VITE_APP_NAME}} builds decentralized identity and blockchain solutions for the modern web. Explore our Web3 products including wallet authentication and multi-chain compatibility."
    />
    <meta property="og:image" content="https://{{VITE_APP_DOMAIN}}/og-image.png" />
    <meta property="og:site_name" content="{{VITE_APP_NAME}}" />
    <meta property="og:locale" content="en" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://{{VITE_APP_DOMAIN}}/" />
    <meta name="twitter:title" content="{{VITE_APP_NAME}} - Web3 Digital Identity Platform" />
    <meta
      name="twitter:description"
      content="{{VITE_APP_NAME}} builds decentralized identity and blockchain solutions for the modern web. Explore our Web3 products including wallet authentication and multi-chain compatibility."
    />
    <meta name="twitter:image" content="https://{{VITE_APP_DOMAIN}}/og-image.png" />

    <!-- Canonical URL - dynamically set by SEO.tsx based on current language -->

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "{{VITE_APP_NAME}}",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "applicationCategory": "BusinessApplication",
        "description": "{{VITE_APP_NAME}} is a Web3 digital identity platform offering decentralized identity solutions, blockchain integration, wallet authentication, and multi-chain compatibility.",
        "operatingSystem": "Web",
        "datePublished": "2024-01-01",
        "dateModified": "{{TODAY}}",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Product showcase",
          "Multi-language support (16 languages)",
          "Dark theme",
          "Web3 wallet authentication",
          "ENS/SNS support",
          "Multi-chain compatibility",
          "Decentralized identity"
        ]
      }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "{{VITE_APP_NAME}}",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "logo": "https://{{VITE_APP_DOMAIN}}/logo.svg",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "{{VITE_SUPPORT_EMAIL}}",
          "contactType": "customer support"
        }
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{VITE_APP_NAME}}",
        "url": "https://{{VITE_APP_DOMAIN}}",
        "inLanguage": [
          "en",
          "ar",
          "de",
          "es",
          "fr",
          "it",
          "ja",
          "ko",
          "pt",
          "ru",
          "sv",
          "th",
          "uk",
          "vi",
          "zh",
          "zh-Hant"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
